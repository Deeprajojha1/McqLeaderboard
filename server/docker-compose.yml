# docker-compose.yml
version: '3'
services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
  app:
    build: .
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=someSecret
      # MONGO_URI etc.
    ports:
      - "3000:3000"
